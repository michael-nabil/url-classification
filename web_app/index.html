<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Link Scanner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; }
        input[type="text"] { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .malicious { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loader { display: none; margin-top: 10px; font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ Link Scanner</h2>
    <p>Paste a URL below to check if it's safe.</p>
    
    <input type="text" id="urlInput" placeholder="http://example.com" autocomplete="off">
    <button onclick="scanLink()">Scan URL</button>
    
    <div id="loader" class="loader">Analyzing features...</div>
    <div id="result"></div>
</div>

<script>
    async function scanLink() {
        const url = document.getElementById('urlInput').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        if (!url) {
            alert("Please enter a URL!");
            return;
        }

        // Reset UI
        resultDiv.style.display = 'none';
        resultDiv.className = '';
        loader.style.display = 'block';

        try {
            // Call the Local FastAPI Backend
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ url: url })
            });

            const data = await response.json();
            
            // Display Results
            loader.style.display = 'none';
            resultDiv.style.display = 'block';
            
            const confidencePercent = (data.confidence_score * 100).toFixed(2);

            if (data.result === "Safe") {
                resultDiv.className = 'safe';
                resultDiv.innerHTML = `✅ Result: SAFE <br><small>Confidence: ${(100-confidencePercent).toFixed(2)}%</small>`;
            } else {
                resultDiv.className = 'malicious';
                resultDiv.innerHTML = `🚨 Result: MALICIOUS <br><small>Confidence: ${confidencePercent}%</small>`;
            }

        } catch (error) {
            loader.style.display = 'none';
            alert("Error connecting to API. Make sure app.py is running!");
            console.error(error);
        }
    }
</script>

</body>
</html>
